<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR HUD Interface</title>
    
    <!-- Google Fonts: Rajdhani for Sci-Fi UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Rajdhani', sans-serif;
            color: #0ff;
            user-select: none;
            -webkit-user-select: none;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #001122 0%, #000000 100%);
        }

        .input_video {
            position: absolute;
            top: 0; left: 0;
            width: 1px; height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .output_canvas {
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            z-index: 1;
            transform: scaleX(-1);
        }

        /* --- HUD UI LAYERS --- */
        #hud-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; /* Allows clicking through to canvas if needed */
            box-sizing: border-box;
            padding: 20px;
        }

        /* Scanline Grid Effect */
        #hud-layer::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 255, 255, 0.05) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: -1;
        }

        /* Corner Brackets */
        .corner {
            position: absolute;
            width: 40px; height: 40px;
            border-color: #00ffff;
            border-style: solid;
            transition: all 0.3s ease;
            opacity: 0.6;
        }
        .tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
        .tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
        .bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
        .br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            align-items: center;
            background: rgba(0, 20, 40, 0.7);
            padding: 8px 30px;
            border: 1px solid #005577;
            border-radius: 4px;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }

        .status-badge {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
        }

        .rec-dot {
            width: 8px; height: 8px;
            background: #ff0055;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 8px #ff0055;
            animation: pulse 1s infinite;
        }

        /* Side Data Panel */
        .data-panel {
            position: absolute;
            top: 50%;
            left: 30px;
            transform: translateY(-50%);
            text-align: left;
        }

        .data-row {
            margin-bottom: 20px;
            opacity: 0.9;
            border-left: 2px solid #005577;
            padding-left: 12px;
            background: linear-gradient(90deg, rgba(0,20,40,0.5) 0%, rgba(0,0,0,0) 100%);
        }

        .label {
            font-size: 0.7rem;
            color: #0088aa;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 2px;
        }

        .value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        /* Action Buttons */
        .action-panel {
            position: absolute;
            top: 30px;
            right: 30px;
            pointer-events: auto; /* Enable clicking */
        }

        .hud-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #ff3333;
            color: #ff3333;
            padding: 8px 15px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        .hud-btn:hover {
            background: #ff3333;
            color: #000;
            box-shadow: 0 0 15px #ff3333;
        }

        /* Start Screen */
        #start-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 5, 10, 0.98);
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #scanner-line {
            width: 100%;
            height: 2px;
            background: #00ffff;
            box-shadow: 0 0 10px #00ffff;
            position: absolute;
            top: 0;
            animation: scan 3s linear infinite;
            opacity: 0.3;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 8px;
            background: linear-gradient(to right, #ffffff, #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        #start-btn {
            margin-top: 40px;
            padding: 15px 50px;
            background: transparent;
            border: 2px solid #00ffff;
            color: #00ffff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
        }

        #start-btn:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.6);
            transform: scale(1.05);
        }

        #error-log {
            color: #ff3333;
            margin-top: 20px;
            font-size: 0.9rem;
            max-width: 80%;
        }

        /* Keyframes */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 10% { opacity: 0.5; } 90% { opacity: 0.5; } 100% { top: 100%; opacity: 0; } }

    </style>
    
    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <!-- Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="container">
        
        <!-- HUD Layer -->
        <div id="hud-layer" style="display:none;">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>

            <div class="top-bar">
                <div class="status-badge"><span class="rec-dot"></span>SYS.ONLINE</div>
                <div class="status-badge" style="color:#aaa; margin: 0 10px;">//</div>
                <div class="status-badge" id="mode-text">SCANNING</div>
            </div>

            <div class="action-panel">
                <button class="hud-btn" id="reset-btn">FLUSH SYSTEM</button>
            </div>

            <div class="data-panel">
                <div class="data-row">
                    <span class="label">COORDINATES</span>
                    <span class="value" id="coord-display">X:000 Y:000</span>
                </div>
                <div class="data-row">
                    <span class="label">TARGET STATUS</span>
                    <span class="value" id="hand-status" style="color:#ff3333;">NO SIGNAL</span>
                </div>
                <div class="data-row">
                    <span class="label">PROTOCOL</span>
                    <span class="value" style="font-size:1rem; color:#ffaa00;">PINCH = CREATE</span>
                </div>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen">
            <div id="scanner-line"></div>
            <h1>A.R. SYSTEM</h1>
            <div style="color: #0088aa; letter-spacing: 4px; margin-top: 10px; font-weight: 600;">VISUAL INTERFACE V3.0</div>
            <button id="start-btn">INITIALIZE</button>
            <div id="error-log"></div>
        </div>

        <video class="input_video" autoplay muted playsinline webkit-playsinline></video>
        <canvas class="output_canvas"></canvas>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- CONFIGURATION ---
        const DRAW_COLOR = 0x9d00ff; // Neon Purple for drawing
        const NEON_CORE_COLOR = 0xffffff; // White core for neon
        const NEON_GLOW_COLOR = 0x5500ff; // Deep blue/purple glow
        const LINE_THICKNESS = 0.12; 

        // --- DOM ELEMENTS ---
        const videoElement = document.querySelector('.input_video');
        const canvasElement = document.querySelector('.output_canvas');
        const startScreen = document.getElementById('start-screen');
        const hudLayer = document.getElementById('hud-layer');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const errorLog = document.getElementById('error-log');
        
        // HUD Elements
        const coordDisplay = document.getElementById('coord-display');
        const handStatus = document.getElementById('hand-status');
        const modeText = document.getElementById('mode-text');

        // --- GLOBALS ---
        let camera, scene, renderer;
        let hands = null;
        let isVideoProcessing = false;
        
        // Interaction State
        let isPinching = false;
        let lastHandPosition = new THREE.Vector3();
        let currentDrawingLine = null;
        let drawingPoints = [];
        let drawingTimeout = null;
        
        // Cursor
        let cursorRing, cursorDot;
        let cursorGroup;
        
        // Objects
        let floatingObjects = []; 
        let activeLines = [];     
        let visibleHeight, visibleWidth;

        // --- SPARKS SYSTEM ---
        const SPARK_COUNT = 400; // Max concurrent sparks
        let sparkPoints;
        let sparkData = [];
        let sparkIndex = 0;

        // --- RESET LOGIC ---
        resetBtn.addEventListener('click', () => {
            floatingObjects.forEach(obj => {
                scene.remove(obj);
                obj.geometry.dispose();
                obj.material.dispose();
            });
            floatingObjects = [];
            
            // Visual feedback on HUD
            const originalText = modeText.innerText;
            modeText.innerText = "FLUSHING...";
            modeText.style.color = "#ff3333";
            setTimeout(() => {
                modeText.innerText = originalText;
                modeText.style.color = "#00ffff";
            }, 500);
        });

        // --- INITIALIZATION ---
        startBtn.addEventListener('click', async () => {
            startBtn.innerText = "LOADING...";
            startBtn.style.opacity = 0.5;
            errorLog.innerText = "";
            try {
                await initApp();
            } catch (err) {
                console.error(err);
                errorLog.innerHTML = `<strong>ERROR:</strong> ${err.message}<br><small>Please ensure camera permissions are granted.</small>`;
                startBtn.innerText = "RETRY";
                startBtn.style.opacity = 1;
            }
        });

        async function initApp() {
            initThree();
            await initMediaPipe();
            await startCamera();
            
            startScreen.style.opacity = 0;
            setTimeout(() => startScreen.style.display = 'none', 500);
            hudLayer.style.display = 'block';
        }

        function initThree() {
            scene = new THREE.Scene();
            // Deep space fog
            scene.fog = new THREE.FogExp2(0x000510, 0.08);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5; 

            // Calculate visible area for accurate AR mapping
            const vFOV = THREE.MathUtils.degToRad(camera.fov);
            visibleHeight = 2 * Math.tan(vFOV / 2) * camera.position.z;
            visibleWidth = visibleHeight * camera.aspect;

            renderer = new THREE.WebGLRenderer({ 
                canvas: canvasElement, 
                alpha: true, 
                antialias: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            
            // --- Lighting ---
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            
            const mainLight = new THREE.DirectionalLight(0xffddaa, 2.0);
            mainLight.position.set(5, 10, 7);
            scene.add(mainLight);
            
            const rimLight = new THREE.PointLight(0x00ffff, 2.0);
            rimLight.position.set(-5, 2, -5);
            scene.add(rimLight);

            // --- Cursor Setup ---
            cursorGroup = new THREE.Group();
            
            // Outer Ring
            const ringGeo = new THREE.RingGeometry(0.15, 0.17, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
            cursorRing = new THREE.Mesh(ringGeo, ringMat);
            
            // Inner Dot
            const dotGeo = new THREE.CircleGeometry(0.02, 16);
            const dotMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            cursorDot = new THREE.Mesh(dotGeo, dotMat);

            cursorGroup.add(cursorRing);
            cursorGroup.add(cursorDot);
            cursorGroup.visible = false;
            scene.add(cursorGroup);

            // --- Spark Particle System Setup ---
            const sparkGeo = new THREE.BufferGeometry();
            const sparkPos = new Float32Array(SPARK_COUNT * 3);
            const sparkCol = new Float32Array(SPARK_COUNT * 3);
            sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPos, 3));
            sparkGeo.setAttribute('color', new THREE.BufferAttribute(sparkCol, 3));

            // Create glowing spark texture procedurally
            const sparkCanvas = document.createElement('canvas');
            sparkCanvas.width = 32; sparkCanvas.height = 32;
            const ctx = sparkCanvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.2, 'rgba(255, 200, 0, 1)');
            gradient.addColorStop(0.4, 'rgba(255, 100, 0, 0.8)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            const sparkTexture = new THREE.CanvasTexture(sparkCanvas);

            const sparkMat = new THREE.PointsMaterial({
                size: 0.18,
                map: sparkTexture,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                transparent: true,
                depthWrite: false
            });

            sparkPoints = new THREE.Points(sparkGeo, sparkMat);
            scene.add(sparkPoints);

            for(let i=0; i<SPARK_COUNT; i++) {
                sparkData.push({ life: 0, velocity: new THREE.Vector3() });
                sparkPos[i*3] = 9999; // Hide initially offscreen
            }

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            const vFOV = THREE.MathUtils.degToRad(camera.fov);
            visibleHeight = 2 * Math.tan(vFOV / 2) * camera.position.z;
            visibleWidth = visibleHeight * camera.aspect;
        }

        // --- MEDIAPIPE ---
        async function initMediaPipe() {
            if (!window.Hands) throw new Error("MediaPipe not loaded");

            hands = new window.Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 0, // Lite for speed
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.5 
            });

            hands.onResults(onHandsResults);
            await hands.initialize();
        }

        async function startCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                throw new Error("Camera API not supported by this browser.");
            }

            let stream;
            try {
                // Attempt 1: Specific ideal constraints
                const constraints = {
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                };
                stream = await navigator.mediaDevices.getUserMedia(constraints);
            } catch (err) {
                console.warn("Primary camera constraints failed, trying fallback...", err);
                try {
                    // Attempt 2: Simplest possible fallback constraint
                    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                } catch (fallbackErr) {
                    console.error("Camera access failed completely:", fallbackErr);
                    throw new Error(`Camera Access Denied: ${fallbackErr.message || fallbackErr.name}`);
                }
            }

            videoElement.srcObject = stream;
            videoElement.muted = true; // Crucial for auto-play policies in modern browsers
            
            return new Promise((resolve, reject) => {
                videoElement.onloadedmetadata = async () => { 
                    try {
                        await videoElement.play(); 
                        processVideo(); 
                        resolve(); 
                    } catch (playErr) {
                        reject(new Error(`Autoplay prevented by browser: ${playErr.message}`));
                    }
                };
                videoElement.onerror = () => reject(new Error("Video loading error."));
            });
        }

        async function processVideo() {
            if (!videoElement.paused && !videoElement.ended && hands && !isVideoProcessing) {
                isVideoProcessing = true;
                try {
                    await hands.send({image: videoElement});
                } catch (e) {
                    console.error(e);
                }
                isVideoProcessing = false;
            }
            requestAnimationFrame(processVideo);
        }

        // --- CORE LOGIC ---

        function onHandsResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                // UI Update
                handStatus.innerText = "TARGET LOCKED";
                handStatus.style.color = "#00ffff";
                handStatus.style.textShadow = "0 0 5px #00ffff";

                const landmarks = results.multiHandLandmarks[0];
                const indexTip = landmarks[8];
                const thumbTip = landmarks[4];

                // --- Dynamic Tracking Algorithm ---
                const rawPos = vectorFromLandmark(indexTip);
                
                // Calculate distance from current position to new target
                const dist = rawPos.distanceTo(lastHandPosition);
                
                // Dynamic Smoothing: 
                // Move fast? Less smoothing (0.8). Move slow? More smoothing (0.15).
                let lerpFactor = 0.5;
                if (dist > 0.5) lerpFactor = 0.8;
                if (dist < 0.1) lerpFactor = 0.15;

                lastHandPosition.lerp(rawPos, lerpFactor);

                // Update Cursor
                cursorGroup.position.copy(lastHandPosition);
                cursorGroup.lookAt(camera.position); // Always face screen
                cursorGroup.visible = true;

                // Update HUD Coordinates
                coordDisplay.innerText = `X:${lastHandPosition.x.toFixed(2)} Y:${lastHandPosition.y.toFixed(2)}`;

                // Pinch Logic
                const thumbPos = vectorFromLandmark(thumbTip);
                const pinchDist = rawPos.distanceTo(thumbPos); 
                // Hysteresis: Easier to hold a pinch (0.9) than start one (0.5)
                const threshold = isPinching ? 0.9 : 0.5; 
                const isNowPinching = pinchDist < threshold; 

                if (isNowPinching) {
                    // PINCH ACTIVE
                    modeText.innerText = "FABRICATING";
                    modeText.style.color = "#9d00ff";
                    
                    // Visual feedback
                    cursorRing.material.color.setHex(0x9d00ff);
                    cursorRing.scale.set(0.6, 0.6, 0.6); // Tighten ring

                    if (!isPinching) startDrawing(lastHandPosition);
                    updateDrawing(lastHandPosition);
                    emitSparks(lastHandPosition); // EMIT SPARKS WHILE DRAWING
                    if (drawingTimeout) clearTimeout(drawingTimeout);
                } else {
                    // IDLE
                    modeText.innerText = "READY";
                    modeText.style.color = "#00ffff";
                    
                    cursorRing.material.color.setHex(0x00ffff);
                    cursorRing.scale.set(1, 1, 1);

                    if (isPinching) {
                        stopDrawing();
                        modeText.innerText = "PROCESSING";
                        drawingTimeout = setTimeout(solidifyDrawing, 600); 
                    }
                }
                isPinching = isNowPinching;
                
                // Physics interaction logic
                checkCollisions(lastHandPosition);

            } else {
                handStatus.innerText = "SCANNING...";
                handStatus.style.color = "#ff3333";
                handStatus.style.textShadow = "none";
                cursorGroup.visible = false;
            }
        }

        function vectorFromLandmark(landmark) {
            const x = (landmark.x - 0.5) * visibleWidth;
            const y = -(landmark.y - 0.5) * visibleHeight;
            return new THREE.Vector3(x, y, 0); 
        }

        // --- DRAWING FUNCTIONS ---
        function startDrawing(pos) {
            drawingPoints = [];
            drawingPoints.push(pos.clone());
            // Draw Line: Neon Purple
            const material = new THREE.LineBasicMaterial({ color: DRAW_COLOR, linewidth: 5 });
            const geometry = new THREE.BufferGeometry().setFromPoints(drawingPoints);
            currentDrawingLine = new THREE.Line(geometry, material);
            currentDrawingLine.userData.points = drawingPoints;
            scene.add(currentDrawingLine);
            activeLines.push(currentDrawingLine);
        }

        function updateDrawing(pos) {
            if (!currentDrawingLine) return;
            const lastPoint = drawingPoints[drawingPoints.length - 1];
            // Only add point if moved slightly (prevents clustering)
            if (pos.distanceTo(lastPoint) > 0.02) {
                drawingPoints.push(pos.clone());
                currentDrawingLine.geometry.setFromPoints(drawingPoints);
            }
        }

        function stopDrawing() { currentDrawingLine = null; }

        function solidifyDrawing() {
            if (activeLines.length === 0) return;
            modeText.innerText = "SOLIDIFIED";

            // Glowing Neon / Smooth Brush Style
            const neonMaterial = new THREE.MeshPhysicalMaterial({ 
                color: NEON_CORE_COLOR,      // Bright white core
                emissive: NEON_GLOW_COLOR,   // Vibrant purple/blue glow
                emissiveIntensity: 1.2,      // High intensity for neon look
                roughness: 0.1,              // Smooth glass-like surface
                metalness: 0.1,              // Non-metallic
                clearcoat: 1.0,              // Shiny outer coating
                clearcoatRoughness: 0.2,     // Slight blur on the reflection
                transparent: true,
                opacity: 0.9                 // Slightly translucent like plasma
            });

            activeLines.forEach(line => {
                const points = line.userData.points;
                if (points && points.length > 1) {
                    const curve = new THREE.CatmullRomCurve3(points);
                    // Use 16 radial segments (instead of 8) for a perfectly smooth brush stroke look
                    const geometry = new THREE.TubeGeometry(curve, points.length * 4, LINE_THICKNESS, 16, false);
                    geometry.center(); 
                    
                    // Re-position mesh to where the line was
                    const center = new THREE.Vector3();
                    const box = new THREE.Box3().setFromPoints(points);
                    box.getCenter(center);

                    const mesh = new THREE.Mesh(geometry, neonMaterial);
                    mesh.position.copy(center);
                    mesh.userData = { velocity: new THREE.Vector3(0, 0, 0), drag: 0.97 };
                    scene.add(mesh);
                    floatingObjects.push(mesh);
                }
                scene.remove(line);
                line.geometry.dispose();
            });
            activeLines = [];
        }

        function checkCollisions(handPos) {
            floatingObjects.forEach(obj => {
                const dist = handPos.distanceTo(obj.position);
                if (dist < 1.2) {
                    const pushDir = new THREE.Vector3().subVectors(obj.position, handPos).normalize();
                    obj.userData.velocity.add(pushDir.multiplyScalar(0.15));
                    obj.rotation.x += Math.random() * 0.1;
                    obj.rotation.y += Math.random() * 0.1;
                }
            });
        }

        // --- SPARK SYSTEM FUNCTIONS ---
        function emitSparks(pos) {
            const emitCount = 4; // Number of sparks generated per frame
            const positions = sparkPoints.geometry.attributes.position.array;
            const colors = sparkPoints.geometry.attributes.color.array;

            for(let i=0; i<emitCount; i++) {
                let idx = sparkIndex % SPARK_COUNT;
                sparkIndex++;
                
                sparkData[idx].life = 1.0 + Math.random() * 0.5;

                // Spread out slightly from the exact drawing point
                positions[idx*3] = pos.x + (Math.random()-0.5)*0.1;
                positions[idx*3+1] = pos.y + (Math.random()-0.5)*0.1;
                positions[idx*3+2] = pos.z + (Math.random()-0.5)*0.1;

                // Random outward velocity, slightly biased to shoot upwards/outwards
                sparkData[idx].velocity.set(
                    (Math.random() - 0.5) * 0.08,
                    (Math.random() - 0.2) * 0.08,
                    (Math.random() - 0.5) * 0.08
                );
                
                // Initial bright color
                colors[idx*3] = 1.0;
                colors[idx*3+1] = 0.9;
                colors[idx*3+2] = 0.5;
            }
            sparkPoints.geometry.attributes.position.needsUpdate = true;
            sparkPoints.geometry.attributes.color.needsUpdate = true;
        }

        function updateSparks() {
            if (!sparkPoints) return;
            const positions = sparkPoints.geometry.attributes.position.array;
            const colors = sparkPoints.geometry.attributes.color.array;
            let needsUpdate = false;

            for(let i=0; i<SPARK_COUNT; i++) {
                if(sparkData[i].life > 0) {
                    sparkData[i].life -= 0.035; // Fade out speed
                    
                    // Apply velocity and gravity
                    positions[i*3] += sparkData[i].velocity.x;
                    positions[i*3+1] += sparkData[i].velocity.y;
                    positions[i*3+2] += sparkData[i].velocity.z;

                    sparkData[i].velocity.y -= 0.003; // Gravity pull down
                    sparkData[i].velocity.multiplyScalar(0.92); // Drag/friction

                    // Color shifts from bright yellow -> orange -> dark red -> invisible
                    const l = sparkData[i].life;
                    colors[i*3] = l; // Red stays strong
                    colors[i*3+1] = Math.max(0, l * 1.2 - 0.4); // Green fades faster
                    colors[i*3+2] = Math.max(0, l * 2.0 - 1.5); // Blue fades immediately

                    if(sparkData[i].life <= 0) {
                        positions[i*3] = 9999; // Move offscreen to hide
                    }
                    needsUpdate = true;
                }
            }

            if(needsUpdate) {
                sparkPoints.geometry.attributes.position.needsUpdate = true;
                sparkPoints.geometry.attributes.color.needsUpdate = true;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Cursor Animation
            if(cursorGroup.visible) {
                cursorRing.rotation.z -= 0.05; // Spin effect
            }

            updateSparks(); // Run particle physics

            floatingObjects.forEach(obj => {
                obj.position.add(obj.userData.velocity);
                obj.userData.velocity.multiplyScalar(obj.userData.drag);
                obj.rotation.x += 0.002;
                obj.rotation.y += 0.005;
            });
            renderer.render(scene, camera);
        }
    </script>
